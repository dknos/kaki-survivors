<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Kitty Kaki Survivors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
    #game-canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #ui-root { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #ui-root > * { pointer-events: auto; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-root"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
